<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b84ff"/>
      <stop offset="100%" style="stop-color:#6c63ff"/>
    </linearGradient>
  </defs>
  <!-- Magnifying glass circle -->
  <circle cx="95" cy="88" r="52" stroke="url(#grad)" stroke-width="7" stroke-linecap="round"/>
  <!-- Handle -->
  <line x1="57" y1="126" x2="30" y2="158" stroke="url(#grad)" stroke-width="9" stroke-linecap="round"/>
  <!-- Bar chart inside circle -->
  <rect x="68" y="105" width="10" height="22" rx="2" fill="url(#grad)" opacity="0.85"/>
  <rect x="83" y="93" width="10" height="34" rx="2" fill="url(#grad)" opacity="0.85"/>
  <rect x="98" y="80" width="10" height="47" rx="2" fill="url(#grad)" opacity="0.85"/>
  <rect x="113" y="90" width="10" height="37" rx="2" fill="url(#grad)" opacity="0.85"/>
  <!-- Upward arrow -->
  <line x1="105" y1="60" x2="148" y2="30" stroke="url(#grad)" stroke-width="6" stroke-linecap="round"/>
  <polyline points="128,24 148,30 142,50" stroke="url(#grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
